services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      STARUN_DATA_ROOT: /data
      STARUN_DATABASE_URL: sqlite:////data/starun.db
      STARUN_ANALYSIS_SKILL_PATH: /opt/starun-skills/deep-sky-advisor
      STARUN_PROCESSING_SKILL_PATH: /opt/starun-skills/deep-sky-processor
      PYTHONDONTWRITEBYTECODE: "1"
    env_file:
      - ./api/.env
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - starun-data:/data
    ports:
      - "8000:8000"
  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      STARUN_API_PROXY_TARGET: http://api:8000
    ports:
      - "3000:3000"

volumes:
  starun-data:
