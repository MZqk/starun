services:
  api:
    build: ./api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      STARUN_DATA_ROOT: /data
    volumes:
      - starun-data:/data
    ports:
      - "8000:8000"
  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  starun-data:
